<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de tareas</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="bg-dark text-white py-3 mb-4">
      <h1 class="container text-centered">TaskFlow</h1>
    </header>

    <!-- Area del clima - API -->
    <div id="clima" class="card p-3 mt-4 bg-light" style="cursor: pointer">
      <h4 class="card-title">Clima actual</h4>
      <div id="resultado-clima"></div>
    </div>
    <div id="resultado-clima" class="mt-3"></div>

    <!-- Notificación flotante -->
    <div
      id="notificacion"
      class="alert alert-success position-fixed top-0 start-50 translate-middle-x mt-3"
      style="display: none; z-index: 1050"
    ></div>

    <!-- Contenedor principal -->
    <div class="container">
      <div class="row">
        <!-- Formulario -->
        <form id="formulario" class="col-md-6">
          <div class="mb-3">
            <input
              type="text"
              id="tarea"
              placeholder="Agrega una tarea"
              class="form-control"
              required
            />
          </div>

          <div class="mb-3">
            <label for="fecha-limite" class="form-label"
              >Fecha y hora límite:</label
            >
            <input
              type="datetime-local"
              id="fecha-limite"
              class="form-control"
            />
          </div>
          <button type="submit" class="btn btn-primary mb-3">Agregar</button>
        </form>

        <div class="col-md-6">
          <div class="">
            <form id="buscador">
              <div class="mb-3">
                <input
                  type="text"
                  id="buscar"
                  placeholder="Buscar tarea"
                  class="form-control"
                />
              </div>
            </form>
            <!-- Lista de tareas  -->
            <div class="card mb-3">
              <div class="card-body bg-info-subtle">
                <h2 class="card-title">Tareas</h2>
                <ul id="lista-tareas" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="./assets/js/tarea.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
